function getLocalDB(){
  try{ const d=localStorage.getItem(DB_KEY); return d?JSON.parse(d):null; }catch(e){return null;}
}
function saveLocalDB(d){
  try{ localStorage.setItem(DB_KEY,JSON.stringify(d)); }catch(e){}
}

async function loadDB(){
  if(useLC){
    try{
      const q=new AV.Query('AppData');
      q.equalTo('key','main');
      const r=await q.first();
      if(r){ const d=r.toJSON(); delete d.objectId; delete d.key; delete d.createdAt; delete d.updatedAt; return d; }
    }catch(e){console.error('LC load:',e);}
  }
  return getLocalDB()||defaultData();
}

async function saveDB(data){
  saveLocalDB(data);
  if(useLC){
    try{
      const q=new AV.Query('AppData');
      q.equalTo('key','main');
      let r=await q.first();
      if(r){ r.set('data',data); await r.save(); }
      else{ const obj=new AV.Object('AppData'); obj.set('key','main'); obj.set('data',data); await obj.save(); }
    }catch(e){console.error('LC save:',e);}
  }
}

async function getData(){ if(!cachedData) cachedData=await loadDB(); return cachedData; }

    'course':['课程','班','课','学什么','教什么','内容','科目','培训'],
    'time':['时间','什么时候','几点','课表','排课','周末','平时','周几'],
    'teacher':['老师','教师','师资','谁教','教学','教课'],
    'age':['年龄','几岁','多大','适合','少儿','成人','小孩','幼儿','宝宝'],
    'enroll':['报名','怎么报','注册','入学','手续'],
    'trial':['试听','体验','试课','免费课'],
    'address':['地址','在哪','位置','校区','怎么去','交通','路线'],
    'hardpen':['硬笔','铅笔','钢笔','写字','规范字'],
    'brush':['毛笔','软笔','楷书','行书','草书','隶书'],
    'painting':['国画','水墨','花鸟','山水','画'],
    'seal':['篆刻','印章','刻章'],
    'refund':['退费','退课','不学了','退款'],
    'compare':['对比','区别','哪个好','选哪个','推荐'],
    'thanks':['谢谢','感谢','太好了','好的','明白']
  };
  for(const[k,ws]of Object.entries(map)){
    if(ws.some(w=>q.includes(w)))intents.push(k);
  }
  return intents.length?intents:['general'];
}

// 提取年龄
function getAge(q){
  const m=q.match(/(\d+)\s*岁/);
  return m?parseInt(m[1]):null;
}

// 主回答函数
function answer(q,data){
  const intents=getIntent(q);
  const age=getAge(q);
  const org=data.org||{};
  const courses=data.courses||[];
  const teachers=data.teachers||[];
  const schedules=data.schedules||[];
  const campuses=data.campuses||[];
  const faqs=data.faqs||[];
  const promos=data.promotions||[];

  // 打招呼
  if(intents.includes('greet')&&intents.length===1){
    return `您好！我是小墨，来点墨书法艺术培训中心的在线顾问 🎨\n\n很高兴为您解答关于书法课程的问题！您可以问我：\n• 📚 有哪些课程？\n• 💰 学费多少钱？\n• 👨‍🏫 老师怎么样？\n• 🕐 上课时间安排？\n• 👶 几岁可以学？\n\n请告诉我您想了解什么？`;
  }

  // 感谢
  if(intents.includes('thanks')&&intents.length===1){
    const replies=['不客气！有问题随时问我 😊','很高兴能帮到您！还有其他问题吗？','谢谢您的信任！欢迎随时咨询 🎋'];
    return replies[Math.floor(Math.random()*replies.length)];
  }

  let parts=[];

  // ===== 年龄+课程推荐 =====
  if(age!==null&&(intents.includes('age')||intents.includes('course')||intents.includes('general'))){
    const suitable=courses.filter(c=>{
      const r=c.age||'';
      if(r.includes('成人')&&age>=18)return true;
      const nums=r.match(/(\d+)[-~至到](\d+)/);
      if(nums)return age>=parseInt(nums[1])&&age<=parseInt(nums[2]);
      const min=r.match(/(\d+)岁以上/);
      if(min)return age>=parseInt(min[1]);
      return false;
    });
    if(suitable.length){
      parts.push(`**${age}岁孩子**，我为您推荐以下课程：`);
      suitable.forEach(c=>{
        parts.push(`• **${c.name}** | ${c.price}${c.unit||'元/期'} | ${c.dur} | 共${c.sessions}次课\n  ${c.desc}`);
      });
      parts.push(`\n💡 建议先预约一节免费体验课，让孩子感受一下课堂氛围。现在预约还赠送书法练习册哦！`);
      if(org.phone)parts.push(`\n📞 咨询电话：${org.phone}`);
      return parts.join('\n');
    }else{
      parts.push(`${age}岁暂时没有完全匹配的课程。不过别担心，建议您联系校区，老师会根据孩子实际情况给出专业建议。`);
      if(org.phone)parts.push(`📞 咨询电话：${org.phone}`);
      return parts.join('\n');
    }
  }

  // ===== 课程咨询 =====
  if(intents.includes('course')||intents.includes('hardpen')||intents.includes('brush')||intents.includes('painting')||intents.includes('seal')){
    let filtered=courses;
    if(intents.includes('hardpen'))filtered=courses.filter(c=>(c.cat||'').includes('硬笔'));
    else if(intents.includes('brush'))filtered=courses.filter(c=>(c.cat||'').includes('毛笔'));
    else if(intents.includes('painting'))filtered=courses.filter(c=>(c.cat||'').includes('国画'));
    else if(intents.includes('seal'))filtered=courses.filter(c=>(c.cat||'').includes('篆刻'));

    if(filtered.length){
      parts.push('我们提供以下课程：');
      filtered.forEach(c=>{
        parts.push(`• **${c.name}**（${c.cat||''}）| 适合${c.age||''} | ${c.level||''} | **${c.price}${c.unit||'元/期'}** | ${c.dur} | 共${c.sessions}次课 | ≤${c.max}人/班\n  ${c.desc}\n  亮点：${c.hl||''}`);
      });
      parts.push(`\n您对哪个课程感兴趣？告诉我孩子的年龄，我可以帮您推荐最合适的！`);
    }
  }

  // ===== 价格 =====
  if(intents.includes('price')){
    if(!intents.includes('course')&&!intents.includes('hardpen')&&!intents.includes('brush')&&!intents.includes('painting')&&!intents.includes('seal')){
      parts.push('我们的课程价格如下：');
      courses.forEach(c=>{
        parts.push(`• **${c.name}**：**${c.price}${c.unit||'元/期'}**（${c.sessions}次课，${c.dur}）`);
      });
    }
    if(promos.length){
      parts.push('\n🎁 **当前优惠活动：**');
      promos.forEach(p=>parts.push(`• ${p.title}：${p.value}${p.cond?'（'+p.cond+'）':''}`));
    }
    parts.push('\n学费包含课时费、课堂用纸墨、学习资料。毛笔班首期赠送文房四宝套装！');
  }

  // ===== 师资 =====
  if(intents.includes('teacher')){
    parts.push('我们的教师团队：');
    teachers.forEach(t=>{
      parts.push(`• **${t.name}** — ${t.title||''}\n  擅长：${t.spec||''} | ${t.exp||''} | ${t.edu||''}\n  获奖：${t.award||''}\n  ${t.bio||''}`);
    });
  }

  // ===== 课表 =====
  if(intents.includes('time')){
    const day=schedules;
    parts.push('当前课表安排：');
    day.forEach(s=>{
      parts.push(`• **${s.day} ${s.time}** | ${s.course} | ${s.teacher}老师 | ${s.campus} | ${s.cur}/${s.max}人`);
    });
    parts.push('\n💡 热门班级名额有限，建议尽早报名哦！');
  }

  // ===== 校区 =====
  if(intents.includes('address')){
    campuses.forEach(c=>{
      parts.push(`• **${c.name}**\n  地址：${c.addr}\n  电话：${c.phone}\n  营业：${c.hours}\n  交通：${c.transport}`);
    });
  }

  // ===== 试听 =====
  if(intents.includes('trial')){
    parts.push('当然可以试听！我们提供**免费体验课** 🎧');
    parts.push('\n预约方式：');
    parts.push('1. 告诉我孩子的年龄和感兴趣的方向');
    parts.push('2. 我帮您推荐合适的体验课');
    parts.push('3. 到校区上课即可');
    parts.push('\n🎁 现在预约体验课还赠送精美书法练习册一本！');
    if(org.phone)parts.push(`\n📞 也可以直接拨打咨询电话：${org.phone}`);
  }

  // ===== 报名 =====
  if(intents.includes('enroll')){
    parts.push('报名方式很简单：');
    parts.push('1. 选择合适的课程和上课时间');
    parts.push('2. 到校区填写报名表');
    parts.push('3. 缴费后即可上课');
    parts.push('\n💡 建议先预约免费体验课，让孩子试听后再决定。');
    if(org.phone)parts.push(`\n📞 咨询报名：${org.phone}`);
  }

  // ===== 退费 =====
  if(intents.includes('refund')){
    parts.push('关于退费：');
    parts.push('• 开课前：可**全额退费**');
    parts.push('• 开课后：按未上课时比例退费');
    parts.push('\n具体退费政策请咨询校区前台，我们会妥善处理。');
    if(org.phone)parts.push(`\n📞 咨询电话：${org.phone}`);
  }

  // ===== 对比 =====
  if(intents.includes('compare')){
    parts.push('帮您对比一下主要课程：');
    courses.slice(0,5).forEach(c=>{
      parts.push(`• **${c.name}**：${c.price}${c.unit||'元/期'} | ${c.age||''} | ${c.dur}`);
    });
    parts.push('\n您想对比哪两个课程？或者告诉我孩子的情况，我帮您推荐！');
  }

  // ===== FAQ匹配 =====
  if(!parts.length){
    const matched=faqs.filter(f=>q.includes(f.q.slice(0,4))||(f.a&&q.split('').filter(c=>f.q.includes(c)).length>3));
    if(matched.length){
      matched.forEach(f=>parts.push(`**Q：${f.q}**\nA：${f.a}`));
    }
  }

  // ===== 兜底 =====
  if(!parts.length){
    parts.push(`感谢您的咨询！我是小墨，来点墨书法艺术培训中心的在线顾问。`);
    parts.push('\n您可以问我：');
    parts.push('• 📚 有哪些课程？多少钱？');
    parts.push('• 👶 几岁可以学？');
    parts.push('• 👨‍🏫 老师怎么样？');
    parts.push('• 🕐 什么时候上课？');
    parts.push('• 📍 校区在哪？');
    parts.push('• 🎧 可以试听吗？');
    if(org.phone)parts.push(`\n📞 也可以直接拨打咨询电话：${org.phone}`);
  }

  return parts.join('\n');
}

// ============================================================
// UI 逻辑
// ============================================================
function Q(t){I.value=t;S();}

async function S(){
  const t=I.value.trim();
  if(!t)return;
  addM('user',t);
  I.value='';I.style.height='auto';
  B.disabled=true;
  const ty=addTy();
  cachedData=await loadDB();
  setTimeout(()=>{
    ty.remove();
    const r=answer(t,cachedData);
    addM('bot',r);
    hist.push({role:'user',content:t},{role:'assistant',content:r});
    if(hist.length>20)hist=hist.slice(-20);
    B.disabled=false;
  },300+Math.random()*300);
}

function addM(role,text){
  const d=document.createElement('div');
  d.className='msg '+(role==='user'?'user':'bot');
  const av=role==='user'?'我':'墨';
  d.innerHTML=`<div class="av">${av}</div><div class="bbl">${fmt(text)}</div>`;
  M.appendChild(d);M.scrollTop=M.scrollHeight;
}

function addTy(){
  const d=document.createElement('div');d.className='msg bot';
  d.innerHTML='<div class="av">墨</div><div class="bbl"><div class="typing"><span></span><span></span><span></span></div></div>';
  M.appendChild(d);M.scrollTop=M.scrollHeight;return d;
}

function fmt(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\*\*(.*?)\*\*/g,'<b>$1</b>').replace(/(\d[\d,]*\.?\d*\s*元[\/期次]*|免费)/g,'<span class="pr">$1</span>').replace(/\n/g,'<br>');}

I.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();S();}});
I.addEventListener('input',()=>{I.style.height='auto';I.style.height=Math.min(I.scrollHeight,80)+'px';});

// ============================================================
// 管理面板
// ============================================================
const TABS=[{k:'org',l:'机构'},{k:'courses',l:'课程'},{k:'teachers',l:'教师'},{k:'schedules',l:'课表'},{k:'campuses',l:'校区'},{k:'faqs',l:'FAQ'},{k:'promotions',l:'优惠'},{k:'password',l:'密码'}];
const FIELDS={
  org:[{k:'name',l:'机构名称'},{k:'slogan',l:'标语'},{k:'intro',l:'简介',t:'textarea'},{k:'phone',l:'咨询电话'},{k:'wechat',l:'微信号'},{k:'philosophy',l:'教学理念',t:'textarea'}],
  courses:[{k:'name',l:'课程名'},{k:'cat',l:'分类'},{k:'desc',l:'描述',t:'textarea'},{k:'age',l:'适合年龄'},{k:'level',l:'级别'},{k:'dur',l:'课时时长'},{k:'sessions',l:'总课时',t:'number'},{k:'price',l:'价格',t:'number'},{k:'unit',l:'价格单位'},{k:'max',l:'每班人数',t:'number'},{k:'hl',l:'亮点'}],
  teachers:[{k:'name',l:'姓名'},{k:'title',l:'职称'},{k:'spec',l:'擅长'},{k:'exp',l:'教龄'},{k:'edu',l:'学历'},{k:'award',l:'获奖'},{k:'bio',l:'简介',t:'textarea'}],
  schedules:[{k:'course',l:'课程名'},{k:'day',l:'星期'},{k:'time',l:'时间段'},{k:'teacher',l:'教师'},{k:'campus',l:'校区'},{k:'cur',l:'当前人数',t:'number'},{k:'max',l:'最大人数',t:'number'}],
  campuses:[{k:'name',l:'校区名'},{k:'addr',l:'地址'},{k:'phone',l:'电话'},{k:'hours',l:'营业时间'},{k:'transport',l:'交通'}],
  faqs:[{k:'cat',l:'分类'},{k:'q',l:'问题'},{k:'a',l:'答案',t:'textarea'}],
  promotions:[{k:'title',l:'标题'},{k:'desc',l:'描述'},{k:'value',l:'优惠内容'},{k:'dates',l:'期限'},{k:'cond',l:'条件'}]
};

let curTab='courses';

function renderTabs(){document.getElementById('adminTabs').innerHTML=TABS.map(t=>`<button class="${t.k===curTab?'active':''}" onclick="switchTab('${t.k}')">${t.l}</button>`).join('');}

async function switchTab(k){
  curTab=k;renderTabs();
  const el=document.getElementById('adminBody');
  if(k==='password')return renderPw(el);
  if(k==='org')return renderOrg(el);
  const data=await getData();
  const items=data[k]||[];
  const fields=FIELDS[k]||[];
  let html=`<div style="font-weight:600;font-size:13px;margin-bottom:8px">📋 ${TABS.find(t=>t.k===k).l}列表（${items.length}条）</div>`;
  items.forEach(item=>{
    html+=`<div class="item-card"><div class="name">${item.name||item.title||item.q||item.course||'#'+item.id}</div>`;
    html+=`<div class="meta">${fields.filter(f=>!['name','title','q'].includes(f.k)).map(f=>item[f.k]).filter(Boolean).join(' | ')}</div>`;
    html+=`<div class="acts"><button class="danger" onclick="delItem('${k}',${item.id})">删除</button></div></div>`;
  });
  if(!items.length)html+='<p style="text-align:center;color:var(--gray);padding:20px">暂无数据</p>';
  html+='<div style="border-top:1px solid var(--border);margin:12px 0;padding-top:12px;font-weight:600;font-size:13px">➕ 添加新数据</div>';
  fields.forEach(f=>{
    html+=`<label>${f.l}</label>`;
    if(f.t==='textarea')html+=`<textarea id="new_${f.k}"></textarea>`;
    else if(f.t==='number')html+=`<input type="number" id="new_${f.k}">`;
    else html+=`<input id="new_${f.k}">`;
  });
  html+=`<button class="add-btn" onclick="addItem('${k}')">添加</button>`;
  el.innerHTML=html;
}

async function renderOrg(el){
  const data=await getData();
  const org=data.org||{};
  const fields=FIELDS.org;
  let html='<div style="font-weight:600;font-size:13px;margin-bottom:12px">🏫 机构信息</div>';
  fields.forEach(f=>{
    html+=`<label>${f.l}</label>`;
    const val=org[f.k]||'';
    if(f.t==='textarea')html+=`<textarea id="org_${f.k}">${val}</textarea>`;
    else html+=`<input id="org_${f.k}" value="${val}">`;
  });
  html+='<button class="add-btn" onclick="saveOrg()">保存</button>';
  el.innerHTML=html;
}

async function saveOrg(){
  const data=await getData();
  if(!data.org)data.org={};
  FIELDS.org.forEach(f=>{const el=document.getElementById('org_'+f.k);if(el)data.org[f.k]=el.value;});
  await saveDB(data);cachedData=data;
  alert('✅ 机构信息已保存');
}

async function addItem(k){
  const data=await getData();
  const fields=FIELDS[k]||[];
  const item={id:Date.now()};
  fields.forEach(f=>{
    let v=(document.getElementById('new_'+f.k)||{}).value||'';
    if(f.t==='number')v=Number(v)||0;
    item[f.k]=v;
  });
  if(!item.name&&!item.title&&!item.q&&!item.course)return alert('请填写必要信息');
  data[k].push(item);await saveDB(data);cachedData=data;
  alert('✅ 添加成功');switchTab(k);
}

async function delItem(k,id){
  if(!confirm('确定删除？'))return;
  const data=await getData();
  data[k]=(data[k]||[]).filter(i=>i.id!==id);
  await saveDB(data);cachedData=data;switchTab(k);
}

function renderPw(el){
  el.innerHTML=`<div style="padding:20px 0">
    <h3 style="margin-bottom:12px">修改管理密码</h3>
    <label>当前密码</label><input type="password" id="pw_old">
    <label>新密码</label><input type="password" id="pw_new">
    <label>确认新密码</label><input type="password" id="pw_cf">
    <button class="add-btn" onclick="changePw()">修改密码</button>
    <p style="margin-top:12px;font-size:12px;color:var(--gray)">默认密码：888888</p>
  </div>`;
}

function changePw(){
  const old=document.getElementById('pw_old').value;
  const nw=document.getElementById('pw_new').value;
  const cf=document.getElementById('pw_cf').value;
  if(old!==getPw())return alert('当前密码错误');
  if(nw.length<4)return alert('新密码至少4位');
  if(nw!==cf)return alert('两次输入不一致');
  localStorage.setItem(PW_KEY,nw);
  alert('✅ 密码修改成功');
}

document.getElementById('adminMask').addEventListener('click',e=>{if(e.target.id==='adminMask')closeAdmin();});

});
