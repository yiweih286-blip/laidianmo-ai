<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>来点墨书法艺术培训中心</title>
<style>
:root{--ink:#1a1a1a;--brown:#5c3a21;--brown-l:#8B4513;--gold:#c8a45c;--paper:#f5f0e8;--paper-l:#faf7f2;--white:#fefdfb;--red:#c23a2b;--green:#2d8a4e;--gray:#666;--gray-l:#999;--border:#e0d8c8}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;-webkit-tap-highlight-color:transparent;overflow:auto;-webkit-overflow-scrolling:touch}
body{font-family:"PingFang SC","Microsoft YaHei","Hiragino Sans GB",sans-serif;background:var(--paper);color:var(--ink)}
.app{display:flex;flex-direction:column;height:100vh;max-width:500px;margin:0 auto;background:var(--paper-l)}
.hdr{background:linear-gradient(135deg,#2c2c2c,#5c3a21);color:#f5f0e8;padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.hdr .seal{width:34px;height:34px;border-radius:50%;background:var(--red);color:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700}
.hdr .info h1{font-size:14px;font-weight:600}
.hdr .info p{font-size:10px;opacity:.7;margin-top:1px}
.hdr .dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:#4ade80;margin-right:3px;vertical-align:middle}
.msgs{flex:1;overflow-y:auto;padding:12px 14px;-webkit-overflow-scrolling:touch;touch-action:pan-y}
.msg{display:flex;gap:8px;margin-bottom:12px;animation:fu .3s ease}
.msg.user{flex-direction:row-reverse}
.msg .av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.msg.bot .av{background:var(--red);color:#fff}
.msg.user .av{background:var(--brown);color:#fff}
.msg .bbl{max-width:78%;padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.6;word-break:break-word}
.msg.bot .bbl{background:var(--white);box-shadow:0 1px 4px rgba(0,0,0,.06)}
.msg.user .bbl{background:var(--brown);color:#f5f0e8}
.msg .bbl .pr{color:var(--red);font-weight:600}
.typing{display:flex;gap:4px;padding:4px 0}
.typing span{width:7px;height:7px;background:var(--gray-l);border-radius:50%;animation:ty 1.4s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes ty{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.tags button{padding:5px 10px;border-radius:12px;border:1px solid var(--border);background:var(--white);font-size:12px;cursor:pointer}
.tags button:active{background:var(--brown);color:#fff}
.foot{padding:10px 14px;border-top:1px solid var(--border);flex-shrink:0;background:var(--paper-l)}
.foot .iw{display:flex;gap:8px;align-items:flex-end}
.foot textarea{flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:20px;font-size:14px;outline:none;resize:none;max-height:80px;background:var(--white)}
.foot textarea:focus{border-color:var(--brown)}
.foot .sbtn{width:38px;height:38px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--brown),var(--brown-l));color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.foot .sbtn:disabled{opacity:.5}
.foot .sbtn svg{width:18px;height:18px;fill:currentColor}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="seal">墨</div>
    <div class="info">
      <h1>来点墨书法艺术培训中心</h1>
      <p><span class="dot"></span>小墨在线 · AI智能客服</p>
    </div>
  </div>
  <div class="msgs" id="msgs">
    <div class="msg bot">
      <div class="av">墨</div>
      <div class="bbl">您好！我是小墨，来点墨书法艺术培训中心的AI顾问 🎨<br><br>我可以帮您了解课程、价格、师资、排课等信息，请问您想了解什么？<div class="tags">
        <button onclick="Q('有哪些课程？')">📚 课程介绍</button>
        <button onclick="Q('学费多少钱？')">💰 学费咨询</button>
        <button onclick="Q('上课时间怎么安排？')">🕐 上课时间</button>
        <button onclick="Q('老师怎么样？')">👨‍🏫 师资力量</button>
        <button onclick="Q('5岁可以学吗？')">👶 适合年龄</button>
        <button onclick="Q('可以试听吗？')">🎧 试听体验</button>
      </div></div>
    </div>
  </div>
  <div class="foot">
    <div class="iw">
      <textarea id="inp" placeholder="输入您想了解的问题..." rows="1"></textarea>
      <button class="sbtn" id="sbtn" onclick="S()"><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
    </div>
  </div>
</div>
<script>
const M=document.getElementById('msgs');
const I=document.getElementById('inp');
const B=document.getElementById('sbtn');
let hist=[];

function Q(t){I.value=t;S();}

async function S(){
  const t=I.value.trim();
  if(!t)return;
  addM('user',t);
  I.value='';I.style.height='auto';
  B.disabled=true;
  const ty=addTy();
  try{
    const r=await fetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:t,history:hist})
    });
    const d=await r.json();
    ty.remove();
    if(d.success){
      addM('bot',d.reply);
      hist.push({role:'user',content:t},{role:'assistant',content:d.reply});
      if(hist.length>20)hist=hist.slice(-20);
    }else{
      addM('bot','抱歉，服务暂时不可用，请拨打咨询电话 400-888-6688。');
    }
  }catch(e){
    ty.remove();
    addM('bot','网络异常，请稍后再试。');
  }
  B.disabled=false;
  I.focus();
}

function addM(role,text){
  const d=document.createElement('div');
  d.className='msg '+(role==='user'?'user':'bot');
  const av=role==='user'?'我':'墨';
  d.innerHTML=`<div class="av">${av}</div><div class="bbl">${fmt(text)}</div>`;
  M.appendChild(d);M.scrollTop=M.scrollHeight;
}

function addTy(){
  const d=document.createElement('div');d.className='msg bot';
  d.innerHTML='<div class="av">墨</div><div class="bbl"><div class="typing"><span></span><span></span><span></span></div></div>';
  M.appendChild(d);M.scrollTop=M.scrollHeight;return d;
}

function fmt(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\*\*(.*?)\*\*/g,'<b>$1</b>').replace(/(\d[\d,]*\.?\d*\s*元[\/期次]*|免费)/g,'<span class="pr">$1</span>').replace(/\n/g,'<br>');}

I.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();S();}});
I.addEventListener('input',()=>{I.style.height='auto';I.style.height=Math.min(I.scrollHeight,80)+'px';});
</script>
</body>
</html>
