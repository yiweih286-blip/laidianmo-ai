.typing span:nth-child(3){animation-delay:.4s}

@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

function getLocalDB(){try{return JSON.parse(localStorage.getItem(DB_KEY))}catch{return null}}
function saveLocalDB(d){localStorage.setItem(DB_KEY,JSON.stringify(d))}

async function loadDB(){
  // 优先从Gitee云端加载
  if(useCloud){
    try{
      const url=`https://gitee.com/api/v5/repos/${GITEE_CONFIG.owner}/${GITEE_CONFIG.repo}/contents/${GITEE_CONFIG.file}?ref=${GITEE_CONFIG.branch}&access_token=${GITEE_CONFIG.token}`;
      const r=await fetch(url);
      if(r.ok){
        const d=await r.json();
        if(d.content){
          const data=JSON.parse(decodeURIComponent(escape(atob(d.content))));
          // 缓存到本地
          saveLocalDB(data);
          // 记录SHA用于后续更新
          GITEE_CONFIG._sha=d.sha;
          return data;
        }
      }
    }catch(e){console.error('Gitee load:',e)}
  }
  return getLocalDB()||defaultData();
}

async function saveDB(data){
  // 保存到本地
  saveLocalDB(data);
  // 保存到Gitee云端
  if(useCloud){
    try{
      const url=`https://gitee.com/api/v5/repos/${GITEE_CONFIG.owner}/${GITEE_CONFIG.repo}/contents/${GITEE_CONFIG.file}`;
      const body={
        access_token:GITEE_CONFIG.token,
        content:btoa(unescape(encodeURIComponent(JSON.stringify(data)))),
        message:'更新数据',
        branch:GITEE_CONFIG.branch
      };
      // 如果有SHA，说明文件已存在，用PUT更新
      if(GITEE_CONFIG._sha){
        body.sha=GITEE_CONFIG._sha;
        const r=await fetch(url,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
        const d=await r.json();
        if(d.content) GITEE_CONFIG._sha=d.content.sha;
      }else{
        // 首次创建
        const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
        const d=await r.json();
        if(d.content) GITEE_CONFIG._sha=d.content.sha;
      }
    }catch(e){console.error('Gitee save:',e)}
  }
}

async function getData(){if(!cachedData)cachedData=await loadDB();return cachedData}

// ========== 智能检索 ==========
const KW={价格:['价格','费用','多少钱','收费','学费','优惠','折扣'],课程:['课程','班','课','学什么','教什么','内容','科目'],时间:['时间','什么时候','几点','课表','排课','周末','平时'],老师:['老师','教师','师资','谁教','教学'],年龄:['年龄','几岁','多大','适合','少儿','成人','小孩'],报名:['报名','怎么报','试听','体验','预约'],地址:['地址','在哪','位置','校区','怎么去','交通'],硬笔:['硬笔','铅笔','钢笔','写字'],毛笔:['毛笔','软笔','楷书','行书','草书'],国画:['国画','水墨','花鸟','山水'],篆刻:['篆刻','印章']};

function getTags(q){const t=[];for(const[k,v]of Object.entries(KW))if(v.some(w=>q.includes(w)))t.push(k);return t}

function buildContext(q,data){
  const tags=getTags(q);const parts=[];
  const org=data.org;
  if(org)parts.push(`【机构】${org.name} | ${org.slogan}\n简介：${org.intro}\n电话：${org.phone}${org.wechat?' | 微信：'+org.wechat:''}`);
  if(data.courses?.length){
    let cs=data.courses;
    if(tags.length)cs=cs.filter(c=>tags.some(t=>(c.cat||'').includes(t)||(c.age||'').includes(t)||(c.name||'').includes(t)||(c.level||'').includes(t)));
    if(!cs.length)cs=data.courses.slice(0,5);
    parts.push('【课程】\n'+cs.map(c=>`- ${c.name}（${c.cat}）| ${c.age} | ${c.level} | ${c.price}${c.unit} | ${c.dur} | 共${c.sessions}次 | ≤${c.max}人${c.desc?'\n  '+c.desc:''}`).join('\n'));
  }
  if(data.teachers?.length)parts.push('【教师】\n'+data.teachers.map(t=>`- ${t.name}（${t.title}）| 擅长：${t.spec} | ${t.exp} | ${t.edu}`).join('\n'));
  if(data.schedules?.length)parts.push('【课表】\n'+data.schedules.map(s=>`- ${s.course} | ${s.day} ${s.time} | ${s.teacher} | ${s.campus} | ${s.cur}/${s.max}人`).join('\n'));
  if(data.campuses?.length)parts.push('【校区】\n'+data.campuses.map(c=>`- ${c.name} | ${c.addr} | ${c.phone} | ${c.hours}`).join('\n'));
  if(data.promotions?.length)parts.push('【优惠】\n'+data.promotions.map(p=>`- ${p.title} | ${p.value}${p.cond?' | 条件：'+p.cond:''}`).join('\n'));
  if(data.faqs?.length){
    let fs=data.faqs;
    if(tags.length)fs=fs.filter(f=>tags.some(t=>(f.cat||'').includes(t)||(f.q||'').includes(q)));
    if(!fs.length)fs=data.faqs.slice(0,3);
    parts.push('【FAQ】\n'+fs.map(f=>`- Q：${f.q}\n  A：${f.a}`).join('\n'));
  }
  return parts.join('\n\n')||'（暂无数据）';
}

async function switchTab(k){
  curTab=k;renderTabs();
  const el=document.getElementById('adminBody');
  if(k==='password')return renderPw(el);
  if(k==='org')return renderOrg(el);
  if(k==='ai')return renderAI(el);
  const data=await getData();
  const items=data[k]||[];
  const fields=FIELDS[k]||[];
  let html=`<div style="font-weight:600;font-size:13px;margin-bottom:8px">📋 ${TABS.find(t=>t.k===k).l}列表（${items.length}条）</div>`;
  items.forEach(item=>{
    html+=`<div class="item-card"><div class="name">${item.name||item.title||item.q||item.course||'#'+item.id}</div>`;
    html+=`<div class="meta">${fields.filter(f=>!['name','title','q'].includes(f.k)).map(f=>item[f.k]).filter(Boolean).join(' | ')}</div>`;
    html+=`<div class="acts"><button onclick="delItem('${k}',${item.id})">删除</button></div></div>`;
  });
  if(!items.length)html+='<p style="text-align:center;color:var(--gray);padding:20px">暂无数据</p>';
  html+='<div style="border-top:1px solid var(--border);margin:12px 0;padding-top:12px;font-weight:600;font-size:13px">➕ 添加新数据</div>';

    else if(f.t==='number')html+=`<input type="number" id="new_${f.k}">`;
    else html+=`<input id="new_${f.k}">`;
  });
  html+=`<button class="add-btn" onclick="addItem('${k}')">添加</button>`;
  el.innerHTML=html;
}

async function renderOrg(el){

    const val=org[f.k]||'';
    if(f.t==='textarea')html+=`<textarea id="org_${f.k}">${val}</textarea>`;
    else html+=`<input id="org_${f.k}" value="${val}">`;
  });
  html+='<button class="add-btn" onclick="saveOrg()">保存</button>';
  el.innerHTML=html;
}

async function saveOrg(){
  const data=await getData();
  if(!data.org)data.org={};
  FIELDS.org.forEach(f=>{const el=document.getElementById('org_'+f.k);if(el)data.org[f.k]=el.value});
  await saveDB(data);cachedData=data;alert('✅ 机构信息已保存');
}

async function addItem(k){
  const data=await getData();
  const fields=FIELDS[k]||[];
  const item={id:Date.now()};
  fields.forEach(f=>{let v=(document.getElementById('new_'+f.k)||{}).value||'';if(f.t==='number')v=Number(v)||0;item[f.k]=v});
  if(!item.name&&!item.title&&!item.q&&!item.course)return alert('请填写必要信息');
  data[k].push(item);await saveDB(data);cachedData=data;
  alert('✅ 添加成功');switchTab(k);
}

async function delItem(k,id){
  if(!confirm('确定删除？'))return;
  const data=await getData();
  data[k]=(data[k]||[]).filter(i=>i.id!==id);
  await saveDB(data);cachedData=data;switchTab(k);
}

// ========== 聊天逻辑 ==========
const M=document.getElementById('msgs');
const I=document.getElementById('inp');
const B=document.getElementById('sendBtn');
let hist=[];

function Q(t){I.value=t;S()}

async function S(){
  const t=I.value.trim();
  if(!t)return;
  addM('user',t);
  I.value='';I.style.height='auto';
  B.disabled=true;
  const ty=addTy();

  // 从数据库构建上下文
  const data=await getData();
  cachedData=data;
  const ctx=buildContext(t,data);

  try{
    // 直接调用DeepSeek API（国内直连，不翻墙）
    const DEEPSEEK_KEY='sk-38fdf55b087848e88666ebf76ffe2873';
    const ai=data.aiPersona||{};
    const aiName=ai.name||'小墨';
    const aiTone=ai.tone||'专业、亲切、耐心';
    const aiRule=ai.rule||'以数据库真实数据为准，不编造。';
    const aiForbidden=ai.forbidden||'';
    const aiKnowledge=data.aiKnowledge||'';
    let systemPrompt=`你是"${data.org?.name||'来点墨书法艺术培训中心'}"的售前AI客服，名叫"${aiName}"。\n\n【人设】语气风格：${aiTone}\n\n【必须遵守的规则】\n${aiRule}${aiForbidden?'\n\n【绝对禁止】\n'+aiForbidden:''}${aiKnowledge?'\n\n【补充知识库】\n'+aiKnowledge:''}\n\n【机构数据】\n${ctx||'（暂无数据）'}`;
    const msgs=[{role:'system',content:systemPrompt},...hist.slice(-10),{role:'user',content:t}];
    const r=await fetch('https://api.deepseek.com/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+DEEPSEEK_KEY},
      body:JSON.stringify({model:'deepseek-chat',messages:msgs,temperature:0.7,max_tokens:500})
    });
    const d=await r.json();
    ty.remove();
    const reply=d.choices?.[0]?.message?.content;
    if(reply){
      addM('bot',reply);
      hist.push({role:'user',content:t},{role:'assistant',content:reply});
      if(hist.length>20)hist=hist.slice(-20);
    }else{
      addM('bot','抱歉，AI服务暂时不可用，请拨打咨询电话 400-888-6688。');
    }
  }catch(e){
    ty.remove();
    addM('bot','网络异常，请稍后再试。');
  }
  B.disabled=false;
  I.focus();
}

  d.innerHTML=`<div class="av">${av}</div><div class="bbl">${fmt(text)}</div>`;
  M.appendChild(d);M.scrollTop=M.scrollHeight;
}

function addTy(){
  const d=document.createElement('div');d.className='msg bot';

function fmt(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\*\*(.*?)\*\*/g,'<b>$1</b>').replace(/(\d[\d,]*\.?\d*\s*元[\/期次]*|免费)/g,'<span class="pr">$1</span>').replace(/\n/g,'<br>');}
